apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemcode-web-ui
  namespace: gemcode-platform
  labels:
    app: gemcode-web-ui
    gemcode.io/role: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemcode-web-ui
  template:
    metadata:
      labels:
        app: gemcode-web-ui
        gemcode.io/role: web-ui
    spec:
      containers:
        - name: web-ui
          image: __WEB_UI_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: GEMCODE_IN_CLUSTER
              value: "true"
            - name: GEMCODE_PLATFORM_NAMESPACE
              value: gemcode-platform
            - name: GEMCODE_TENANTS_NAMESPACE
              value: gemcode-tenants
            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: gemcode-web-ui-oauth
                  key: nextauth_url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gemcode-web-ui-oauth
                  key: nextauth_secret
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gemcode-web-ui-oauth
                  key: google_client_id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gemcode-web-ui-oauth
                  key: google_client_secret
            - name: GEMCODE_PROVISIONER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gemcode-provisioner-admin
                  key: token
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/auth/status
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/auth/status
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gemcode-web-ui
  namespace: gemcode-platform
  labels:
    app: gemcode-web-ui
spec:
  type: LoadBalancer
  selector:
    app: gemcode-web-ui
  ports:
    - name: http
      port: 80
      targetPort: 3000
