apiVersion: v1
kind: ServiceAccount
metadata:
  name: gemcode-provisioner
  namespace: gemcode-platform
  labels:
    gemcode.io/role: provisioner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gemcode-tenant-manager
  namespace: gemcode-tenants
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "services", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gemcode-provisioner-tenants
  namespace: gemcode-tenants
subjects:
  - kind: ServiceAccount
    name: gemcode-provisioner
    namespace: gemcode-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gemcode-tenant-manager
