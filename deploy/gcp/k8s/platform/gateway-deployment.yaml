apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemcode-tenant-gateway
  namespace: gemcode-platform
  labels:
    app: gemcode-tenant-gateway
    gemcode.io/role: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemcode-tenant-gateway
  template:
    metadata:
      labels:
        app: gemcode-tenant-gateway
        gemcode.io/role: gateway
    spec:
      containers:
        - name: gateway
          image: __GATEWAY_IMAGE__
          ports:
            - containerPort: 8080
          env:
            - name: TENANTS_NAMESPACE
              value: gemcode-tenants
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gemcode-tenant-gateway
  namespace: gemcode-platform
  labels:
    app: gemcode-tenant-gateway
spec:
  selector:
    app: gemcode-tenant-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
