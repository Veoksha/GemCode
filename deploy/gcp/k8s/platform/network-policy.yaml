# Deny tenant pods talking to each other; only platform namespace may reach tenant APIs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-tenant-to-tenant
  namespace: gemcode-tenants
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gemcode-platform
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gemcode-tenants
          podSelector:
            matchLabels:
              gemcode.io/role: provisioner
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
